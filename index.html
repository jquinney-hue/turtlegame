<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Python Turtle Robot Game</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --success-color: #2ea043;
            --turtle-color: #3fb950;
            --danger-color: #da3633;
            --loop-color: #d29922;
            --cell-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #msg-input-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

#msg-input-wrapper input {
    width: 60px;
    text-align: center;
}

#msg-input-wrapper #msg-btn-minus {
    width: 60px;
    text-align: center;
}

#msg-input-wrapper #msg-btn-plus {
    width: 60px;
    text-align: center;
}

        header {
            width: 100%;
            padding: 8px 15px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 0 0 auto;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #timer {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--danger-color);
            font-variant-numeric: tabular-nums;
        }

        /* Responsive Grid Board */
        #game-board {
            width: 100%;
            max-width: 400px;
            flex: 0 1 35vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid-container {
            position: relative;
            height: 100%;
            aspect-ratio: 1 / 1;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .grid {
            display: grid;
            width: 100%;
            height: 100%;
        }

        .cell {
            border: 1px dashed var(--cell-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1rem, 3.5vh, 1.5rem);
        }

        #robot-wrapper {
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s ease-in-out;
            z-index: 5;
            filter: drop-shadow(0 0 4px rgba(63, 185, 80, 0.6));
        }

        /* Recolor Black PNG to Green using CSS filter */
        #robot {
            width: 80%; 
            height: 80%;
            background-image: url('https://www.svgheart.com/wp-content/uploads/2021/11/turtle-sea-beach-free-svg-file-SvgHeart.Com.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            /* Turns the black PNG into a green color matching our theme */
            filter: invert(56%) sepia(73%) saturate(410%) hue-rotate(76deg) brightness(94%) contrast(89%);
            transition: transform 0.4s ease-in-out;
        }

        /* Workspace & Editor */
        #workspace {
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px 10px;
            gap: 8px;
        }

        #code-display {
            flex: 1;
            min-height: 60px;
            background: #010409;
            border: 2px dashed var(--border-color);
            border-left: 3px solid var(--accent-color);
            padding: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            border-radius: 6px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #79c0ff;
            transition: border-color 0.2s, background-color 0.2s;
            position: relative;
        }

        #code-display.drag-over {
            border-color: var(--success-color);
            background-color: rgba(35, 134, 54, 0.1);
        }

        .empty-hint {
            color: #484f58;
            font-style: italic;
            position: absolute;
            top: 10px; left: 10px;
            pointer-events: none;
        }

        /* Control Palette */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            flex: 0 0 auto;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 6px;
            flex: 0 0 auto;
        }

        button, .draggable {
            background: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: grab;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            text-align: center;
        }

        button:active, .draggable:active { background: #30363d; cursor: grabbing; }
        
        .draggable.btn-loop { color: var(--loop-color); border-color: rgba(210, 153, 34, 0.4); }
        
        .btn-run { background: var(--success-color); color: white; border-color: transparent; font-size: 1rem; cursor: pointer; flex-direction: row;}
        .btn-run:active { background: #238636; transform: scale(0.98); }
        .btn-danger { color: #ff7b72; border-color: rgba(218, 54, 51, 0.4); cursor: pointer; flex-direction: row;}

        /* Drag Ghost */
        .drag-clone {
            position: fixed;
            z-index: 9999;
            opacity: 0.9;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        /* Modals */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 4, 9, 0.85); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 20px; text-align: center;
        }

        .modal-box {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 12px; width: 100%; max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 15px;
        }
        .modal-box h3 { margin: 0; color: var(--text-color); font-size: 1.1rem; }
        .modal-box p { margin: 0; color: #8b949e; font-size: 0.9rem; }
        .modal-box input {
            background: var(--bg-color); border: 1px solid var(--border-color); color: white;
            padding: 10px; border-radius: 6px; font-size: 1rem; text-align: center; width: 100%;
        }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button { flex: 1; padding: 12px; flex-direction: row; }
        .btn-primary { background: var(--accent-color); color: #000; border: none; cursor: pointer; }

        .hidden { display: none !important; }

        /* Syntax */
        .kw { color: #ff7b72; } .fn { color: #d2a8ff; } .num { color: #79c0ff; }
        .comment { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Python Turtle</h1>
        <div id="timer">03:00</div>
    </header>

    <div id="game-board">
        <div id="grid-container">
            <div class="grid" id="grid"></div>
            <div id="robot-wrapper">
                <div id="robot"></div>
            </div>
        </div>
    </div>

    <div id="workspace">
        <div id="code-display">
            <div class="empty-hint">Drag & Drop blocks here...</div>
        </div>
        
        <!-- Draggable blocks palette -->
        <div class="controls" id="controls">
            <div class="draggable" data-type="cmd" data-cmd="forward()"><span>⬆️</span> Forward</div>
            <div class="draggable" data-type="cmd" data-cmd="left()"><span>↩️</span> Left</div>
            <div class="draggable" data-type="cmd" data-cmd="right()"><span>↪️</span> Right</div>
            <div class="draggable btn-loop" data-type="loop"><span>🔄</span> Loop (for)</div>
            <div class="draggable btn-loop" data-type="endloop"><span>🔚</span> End Loop</div>
        </div>

        <!-- Action buttons -->
        <div class="action-row">
            <button class="btn-danger" onclick="clearCode()">🗑️ Clear</button>
            <button class="btn-run" onclick="runCode()">▶️ RUN</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="state-overlay" class="overlay">
        <div class="modal-box">
            <h2 id="state-title" style="color: var(--accent-color); margin: 0;">Ready to Code?</h2>
            <p id="state-desc">Drag blocks into the code area to build a path for the turtle to the goal 🏁.</p>
            <button class="btn-primary" style="padding: 12px;" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div id="msg-modal" class="overlay hidden" style="z-index: 30;">
    <div class="modal-box">
        <h3 id="msg-title">Title</h3>
        <p id="msg-text">Message goes here.</p>

        <div id="msg-input-wrapper" class="hidden">
            <button id="msg-btn-minus">-</button>
            <input type="number" id="msg-input" value="3" min="1" max="99">
            <button id="msg-btn-plus">+</button>
        </div>

        <div class="modal-buttons">
            <button id="msg-btn-cancel" class="btn-danger hidden">Cancel</button>
            <button id="msg-btn-ok" class="btn-primary">OK</button>
        </div>
    </div>
</div>

<script>
    // Game Config & State
    const GRID_SIZE = 8;
    const MAZE_STR = [
        "S......W",
        "WWWWWW.W",
        "W......W",
        "W.WWWWWW",
        "W......W",
        "WWWWWW.W",
        "WF.....W",
        "WWWWWWWW"
    ];

    let START = { x: 0, y: 0, dir: 1 };
    let TARGET = { x: 7, y: 0 };
    const OBSTACLES = [];

    // Parse Maze Layout
    MAZE_STR.forEach((row, y) => {
        for (let x = 0; x < row.length; x++) {
            const cell = row[x];
            if (cell === 'W') OBSTACLES.push({x, y});
            else if (cell === 'S') START = {x, y, dir: 1};
            else if (cell === 'F') TARGET = {x, y};
        }
    });

    let robotState = { ...START };
    let codeLines = [];
    let indentLevel = 0;
    let timerInterval = null;
    let timeLeft = 180;
    let gameActive = false;
    let isRunning = false;

    // DOM Elements
    const gridEl = document.getElementById('grid');
    const robotWrapper = document.getElementById('robot-wrapper');
    const robotIcon = document.getElementById('robot');
    const codeDisplay = document.getElementById('code-display');
    const timerEl = document.getElementById('timer');
    
    // Init Grid
    function initBoard() {
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
        gridEl.style.gridTemplateRows = `repeat(${GRID_SIZE}, 1fr)`;
        
        robotWrapper.style.width = `${100 / GRID_SIZE}%`;
        robotWrapper.style.height = `${100 / GRID_SIZE}%`;

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (x === TARGET.x && y === TARGET.y) cell.innerHTML = '🏁';
                if (OBSTACLES.some(o => o.x === x && o.y === y)) cell.innerHTML = '🧱';
                gridEl.appendChild(cell);
            }
        }
        updateRobotVisuals(false);
    }

    // Custom Drag and Drop implementation for cross-device support (Pointer Events)
    let dragClone = null;
    let dragData = null;
    let startX = 0, startY = 0;

    document.querySelectorAll('.draggable').forEach(el => {
        el.addEventListener('pointerdown', handlePointerDown);
    });

    function handlePointerDown(e) {
        if (!gameActive || isRunning) return;
        
        const target = e.currentTarget;
        startX = e.clientX;
        startY = e.clientY;
        
        dragData = { type: target.dataset.type, cmd: target.dataset.cmd };

        dragClone = target.cloneNode(true);
        dragClone.classList.add('drag-clone');
        dragClone.style.width = target.offsetWidth + 'px';
        dragClone.style.height = target.offsetHeight + 'px';
        document.body.appendChild(dragClone);
        
        moveClone(e.clientX, e.clientY);
        
        document.addEventListener('pointermove', handlePointerMove);
        document.addEventListener('pointerup', handlePointerUp);
        document.addEventListener('pointercancel', handlePointerUp);
    }

    function moveClone(x, y) {
        if (dragClone) {
            dragClone.style.left = (x - dragClone.offsetWidth / 2) + 'px';
            dragClone.style.top = (y - dragClone.offsetHeight / 2) + 'px';
        }
    }

    function handlePointerMove(e) {
        moveClone(e.clientX, e.clientY);
        
        const rect = codeDisplay.getBoundingClientRect();
        if (e.clientX >= rect.left && e.clientX <= rect.right && 
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
            codeDisplay.classList.add('drag-over');
        } else {
            codeDisplay.classList.remove('drag-over');
        }
    }

    async function handlePointerUp(e) {
        document.removeEventListener('pointermove', handlePointerMove);
        document.removeEventListener('pointerup', handlePointerUp);
        document.removeEventListener('pointercancel', handlePointerUp);

        if (dragClone) {
            dragClone.remove();
            dragClone = null;
        }
        codeDisplay.classList.remove('drag-over');

        const distMoved = Math.hypot(e.clientX - startX, e.clientY - startY);
        const rect = codeDisplay.getBoundingClientRect();
        
        const droppedInCodeArea = (e.clientX >= rect.left && e.clientX <= rect.right && 
                                   e.clientY >= rect.top && e.clientY <= rect.bottom);

        if (droppedInCodeArea || distMoved < 10) {
            if (dragData.type === 'cmd') {
                addCommand(dragData.cmd);
            } else if (dragData.type === 'loop') {
                await triggerAddLoop();
            } else if (dragData.type === 'endloop') {
                endLoop();
            }
        }
        dragData = null;
    }

    function showModal(title, text, type = 'alert') {
    return new Promise((resolve) => {
        const modal = document.getElementById('msg-modal');
        const titleEl = document.getElementById('msg-title');
        const textEl = document.getElementById('msg-text');
        const inputEl = document.getElementById('msg-input');
        const inputWrapper = document.getElementById('msg-input-wrapper');
        const btnCancel = document.getElementById('msg-btn-cancel');
        const btnOk = document.getElementById('msg-btn-ok');
        const btnPlus = document.getElementById('msg-btn-plus');
        const btnMinus = document.getElementById('msg-btn-minus');

        titleEl.innerText = title;
        textEl.innerText = text;

        if (type === 'prompt') {
            inputWrapper.classList.remove('hidden');
            inputEl.value = 3;
            btnCancel.classList.remove('hidden');
        } else {
            inputWrapper.classList.add('hidden');
            btnCancel.classList.add('hidden');
        }

        modal.classList.remove('hidden');

        const onPlus = () => {
            const max = parseInt(inputEl.max) || 99;
            const value = parseInt(inputEl.value) || 0;
            inputEl.value = Math.min(max, value + 1);
        };

        const onMinus = () => {
            const min = parseInt(inputEl.min) || 1;
            const value = parseInt(inputEl.value) || 0;
            inputEl.value = Math.max(min, value - 1);
        };

        const cleanup = () => {
            btnOk.removeEventListener('click', onOk);
            btnCancel.removeEventListener('click', onCancel);
            btnPlus.removeEventListener('click', onPlus);
            btnMinus.removeEventListener('click', onMinus);
            modal.classList.add('hidden');
        };

        const onOk = () => {
            cleanup();
            resolve(type === 'prompt' ? parseInt(inputEl.value) || 0 : true);
        };

        const onCancel = () => {
            cleanup();
            resolve(null);
        };

        btnOk.addEventListener('click', onOk);
        btnCancel.addEventListener('click', onCancel);
        btnPlus.addEventListener('click', onPlus);
        btnMinus.addEventListener('click', onMinus);
    });
}

    // Syntax Rendering
    function formatSyntax(line, type) {
        if (type === 'cmd') return `<span class="fn">${line.replace('()', '')}</span>()`;
        if (type === 'loop') {
            const match = line.match(/for i in range\((\d+)\):/);
            if (match) return `<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">${match[1]}</span>):`;
        }
        return line;
    }

    function renderCode() {
        if (codeLines.length === 0) {
            codeDisplay.innerHTML = '<div class="empty-hint">Drag & Drop blocks here...</div>';
            return;
        }
        
        let html = '';
        codeLines.forEach(line => {
            const indentSpaces = '&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(line.indent);
            html += `${indentSpaces}${formatSyntax(line.raw, line.type)}<br>`;
        });
        
        if (indentLevel > 0) {
            html += '&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(indentLevel) + '<span class="comment"># (inside loop)</span>';
        }

        codeDisplay.innerHTML = html;
        codeDisplay.scrollTop = codeDisplay.scrollHeight;
    }

    // Logic Functions
    function addCommand(cmd) {
        codeLines.push({ type: 'cmd', raw: cmd, indent: indentLevel });
        renderCode();
    }

    async function triggerAddLoop() {
        const times = await showModal("Loop", "How many times should the loop run?", "prompt");
        if (times && times > 0) {
            codeLines.push({ type: 'loop', raw: `for i in range(${times}):`, count: times, indent: indentLevel });
            indentLevel++;
            renderCode();
        }
    }

    function endLoop() {
        if (indentLevel > 0) { indentLevel--; renderCode(); }
    }

    function clearCode() {
        if (isRunning) return;
        codeLines = []; indentLevel = 0; renderCode();
    }

    function unrollCode() {
        function parseSegment(startIndex, targetIndent) {
            let result = []; let i = startIndex;
            while (i < codeLines.length) {
                let line = codeLines[i];
                if (line.indent < targetIndent) break;
                if (line.type === 'cmd') { result.push(line.raw); i++; } 
                else if (line.type === 'loop') {
                    let parsedBlock = parseSegment(i + 1, targetIndent + 1);
                    for (let c = 0; c < line.count; c++) result = result.concat(parsedBlock.commands);
                    i = parsedBlock.nextIndex;
                }
            }
            return { commands: result, nextIndex: i };
        }
        return parseSegment(0, 0).commands;
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function runCode() {
        if (!gameActive || isRunning) return;
        if (codeLines.length === 0) { await showModal("Empty Script", "Drag some commands in first!"); return; }

        isRunning = true;
        robotState = { ...START };
        updateRobotVisuals(false); 
        await sleep(400); 

        const commands = unrollCode();
        
        for (let cmd of commands) {
            if (!gameActive) break; 

            if (cmd === 'forward()') {
                let nx = robotState.x, ny = robotState.y;
                if (robotState.dir === 0) ny -= 1;
                else if (robotState.dir === 1) nx += 1;
                else if (robotState.dir === 2) ny += 1;
                else if (robotState.dir === 3) nx -= 1;

                if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) {
                    await showModal("Crash!", "The turtle hit the edge.");
                    resetRun(); return;
                }
                if (OBSTACLES.some(o => o.x === nx && o.y === ny)) {
                    await showModal("Crash!", "The turtle hit a brick wall.");
                    resetRun(); return;
                }
                robotState.x = nx; robotState.y = ny;
            } 
            else if (cmd === 'left()') robotState.dir = (robotState.dir + 3) % 4;
            else if (cmd === 'right()') robotState.dir = (robotState.dir + 1) % 4;

            updateRobotVisuals(true);
            await sleep(450); 
        }

        if (robotState.x === TARGET.x && robotState.y === TARGET.y) endGame(true);
        else { await showModal("Finished", "Script finished, but the turtle isn't at the goal flag."); resetRun(); }
    }

    function resetRun() {
        isRunning = false; robotState = { ...START }; updateRobotVisuals(true);
    }

    function updateRobotVisuals(animate = true) {
        robotWrapper.style.transition = animate ? 'transform 0.4s ease-in-out' : 'none';
        robotIcon.style.transition = animate ? 'transform 0.4s ease-in-out' : 'none';
        robotWrapper.style.transform = `translate(${robotState.x * 100}%, ${robotState.y * 100}%)`;
        
        // Image faces Up by default (0 degrees).
        // dir mapping: 0=Up, 1=Right, 2=Down, 3=Left
        let angle = 0;
        if (robotState.dir === 0) angle = 0;
        if (robotState.dir === 1) angle = 90;
        if (robotState.dir === 2) angle = 180;
        if (robotState.dir === 3) angle = 270;
        
        robotIcon.style.transform = `rotate(${angle}deg)`;
    }

    // Game Flow
    function startGame() {
        document.getElementById('state-overlay').classList.add('hidden');
        gameActive = true; isRunning = false; timeLeft = 300;
        robotState = { ...START }; clearCode(); initBoard();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let secs = (timeLeft % 60).toString().padStart(2, '0');
            timerEl.innerText = `${mins}:${secs}`;
            if (timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        clearInterval(timerInterval);
        gameActive = false; isRunning = false;
        
        const overlay = document.getElementById('state-overlay');
        const title = document.getElementById('state-title');
        const desc = document.getElementById('state-desc');
        overlay.classList.remove('hidden');
        
        if (win) {
            title.innerText = "🎉 Success!"; title.style.color = "var(--success-color)";
            desc.innerText = "You successfully programmed the turtle!";
        } else {
            title.innerText = "⏰ Time's Up!"; title.style.color = "var(--danger-color)";
            desc.innerText = "You ran out of time.";
        }
        overlay.querySelector('button').innerText = "Play Again";
    }

    initBoard();
</script>
</body>
</html>
